version: '3.8'

services:
  lidar-app:
    build: .
    container_name: lidar-touch-controller
    environment:
      - DISPLAY=$DISPLAY
      - XAUTHORITY=/tmp/.X11-unix/Xauthority
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ~/.Xauthority:/home/user/.Xauthority:rw
      - ./:/home/user/app
      - /dev/input:/dev/input:rw
      - /run/dbus:/run/dbus:ro
    network_mode: host
    privileged: true
    restart: unless-stopped
    ipc: host
